[16:28, 19/04/2026] Clever Luzia: <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nunca é Tarde Para Aprender - Prestadora de Serviços Diversos</title>
<link rel="icon" type="image/png" href="logo.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;background:#f8fafc;}

.container{max-width:1200px;margin:0 auto;padding:0 20px;}
.hero,.section{position:relative;overflow:hidden;padding:80px 0;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:30px;}
.card{background:#fff;padding:30px;border-radius:12px;}

/* ===== CIRCULOS ===== */
.circle-images{
position:absolute;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:15px;
z-index:5;
}

.circle-left{left:10px;}
.circle-right{right:10px;}

.circle-images a{
animation:float 6s ease-in-out infinite;
}

.circle-images a:nth-child(2){animation-delay:1s;}
.circle-images a:nth-child(3){animation-delay:2s;}
.circle-images a:nth-child(4){animation-delay:3s;}

.circle-images img{
width:65px;
height:65px;
border-radius:50%;
object-fit:cover;
border:3px solid #fff;
box-shadow:0 8px 18px rgba(0,0,0,0.25);
transition:0.4s;
}

.circle-images img:hover{
transform:scale(1.2) rotate(6deg);
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

@media(max-width:768px){
.circle-images{display:none;}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

<div class="circle-images circle-left">
<a href="https://wa.me/244945600620"><img src="img/banner-criacao-sites.jpeg"></a>
<a href="https://wa.me/244945600620"><img src="img/banner-design.jpeg"></a>
</div>

<div class="circle-images circle-right">
<a href="https://wa.me/244945600620"><img src="img/banner-marketing.jpeg"></a>
<a href="https://wa.me/244945600620"><img src="img/banner-whatsapp.jpeg"></a>
</div>

<div class="container">
<h1>NUNCA É TARDE PARA APRENDER</h1>
<p>Prestadora de Serviços Diversos.</p>
</div>
</section>

<!-- APPS -->
<section class="section">

<div class="circle-images circle-left">
<a href="https://wa.me/244945600620"><img src="img/banner-gestao-escolar.jpeg"></a>
<a href="https://wa.me/244945600620"><img src="img/banner-vendas.jpeg"></a>
</div>

<div class="circle-images circle-right">
<a href="https://wa.me/244945600620"><img src="img/banner-restaurante.jpeg"></a>
<a href="https://wa.me/244945600620"><img src="img/banner-suporte.jpeg"></a>
</div>

<div class="container">
<h2>Catálogo de Aplicativos</h2>

<div class="grid">
<div class="card"><h3>EduManager Pro</h3></div>

<div class="card"><h3>MesaCerta</h3></div>
</div>

</div>
</section>

<div class="circle-images circle-left">
<a href="https://wa.me/244945600620"><img src="img/banner-design.jpeg"></a>
<a href="https://wa.me/244945600620"><img src="img/banner-criacao-sites.jpeg"></a>
</div>

</div>

<div class="card"><h3>Criação de Sites</h3></div>

<div class="card"><h3>Suporte Técnico</h3></div>
</div>

</div>
</section>

<!-- SCRIPT -->
<script>
// ROTAÇÃO AUTOMÁTICA DAS IMAGENS
const imgs=[
"img/banner-criacao-sites.jpeg",
"img/banner-design.jpeg",
"img/banner-gestao-escolar.jpeg",
"img/banner-marketing.jpeg",
"img/banner-restaurante.jpeg",
"img/banner-suporte.jpeg",
"img/banner-vendas.jpeg",
"img/banner-whatsapp.jpeg"
];

document.querySelectorAll('.circle-images img').forEach((img,i)=>{
setInterval(()=>{
let r=Math.floor(Math.random()*imgs.length);
img.src=imgs[r];
},5000+(i*700));
});
</script>
