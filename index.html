<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;background:#f8fafc}

/* ==== TEU CSS ORIGINAL (RESUMIDO ESSENCIAL) ==== */
.container{max-width:1200px;margin:auto;padding:0 20px;}
.hero{padding:80px 0;text-align:center;background:#dbeafe;}
.section{padding:80px 0;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;}
.card{background:#fff;padding:20px;border-radius:10px;}

/* ==== LATERAIS NOVAS ==== */
.side-images{
position:fixed;
top:50%;
transform:translateY(-50%);
z-index:999;
display:flex;
flex-direction:column;
gap:15px;
}
.side-images.left{left:10px;}
.side-images.right{right:10px;}

.side-images a{
animation:float 4s ease-in-out infinite;
}

.side-images img{
width:65px;
height:65px;
border-radius:50%;
object-fit:cover;
border:3px solid #fff;
box-shadow:0 6px 12px rgba(0,0,0,0.2);
transition:0.3s;
}

.side-images img:hover{
transform:scale(1.15) rotate(5deg);
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

@media(max-width:768px){
.side-images{display:none;}
}
</style>
</head>

<!-- ===== SCRIPT CARROSSEL CORRIGIDO ===== -->
<script>
function iniciarCarrossel(id){
let index=0;
const slides=document.querySelectorAll('#'+id+' .bg-slide'); // CORRIGIDO
const total=slides.length;

function proximo(){
slides.forEach(s=>s.classList.remove('active'));
index=(index+1)%total;
slides[index].classList.add('active');
}

setInterval(proximo,10000);
}

iniciarCarrossel('hero-bg');
iniciarCarrossel('apps-bg');
iniciarCarrossel('services-bg');
</script>
